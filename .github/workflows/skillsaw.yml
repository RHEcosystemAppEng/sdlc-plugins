name: Skillsaw

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Skill Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run skillsaw
        # skillsaw v0 (0.15.0)
        uses: stbenjam/skillsaw@1bf34517f8c38193814a0ff7199d028897fbf344
        with:
          strict: true
