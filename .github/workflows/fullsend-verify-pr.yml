name: fullsend verify-pr

on:
  workflow_dispatch:
    inputs:
      jira_issue_id:
        description: 'Jira issue ID (e.g., TC-4792)'
        required: true

concurrency:
  group: fullsend-verify-pr
  cancel-in-progress: false

jobs:
  verify-pr:
    uses: mrizzi/sdlc-plugins/.github/workflows/reusable-verify-pr.yml@run-in-fullsend
    with:
      jira_issue_id: ${{ inputs.jira_issue_id }}
      gcp_region: ${{ secrets.GCP_CLOUD_ML_REGION }}
    secrets:
      FULLSEND_GCP_WIF_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER }}
      FULLSEND_GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      JIRA_SERVER_URL: ${{ secrets.JIRA_SERVER_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
      packages: read
