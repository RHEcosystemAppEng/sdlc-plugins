version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /var/log
    - /usr
    - /lib
    - /lib64
    - /proc
    - /dev/urandom
    - /etc
    - /opt
  read_write:
    - /tmp
    - /dev/null
    - /sandbox

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  llm_api:
    endpoints:
      - host: api.anthropic.com
        port: 443
      - host: "*-aiplatform.googleapis.com"
        port: 443
      - host: "bedrock-runtime.*.amazonaws.com"
        port: 443
    binaries:
      - { path: /usr/local/bin/* }
      - { path: /usr/bin/* }
  jira:
    endpoints:
      - host: "*.atlassian.net"
        port: 443
    binaries:
      - { path: /usr/local/bin/* }
      - { path: /usr/bin/* }
  github_api:
    endpoints:
      - host: api.github.com
        port: 443
    binaries:
      - { path: /usr/local/bin/* }
      - { path: /usr/bin/* }
  github_git:
    endpoints:
      - host: github.com
        port: 443
      - host: github.com
        port: 22
    binaries:
      - { path: /usr/bin/git }
      - { path: /usr/bin/ssh }
  npm_registry:
    endpoints:
      - host: registry.npmjs.org
        port: 443
    binaries:
      - { path: /usr/local/bin/* }
      - { path: /usr/bin/* }
  crates_io:
    endpoints:
      - host: crates.io
        port: 443
      - host: static.crates.io
        port: 443
    binaries:
      - { path: /usr/bin/* }
  pypi:
    endpoints:
      - host: pypi.org
        port: 443
      - host: files.pythonhosted.org
        port: 443
    binaries:
      - { path: /usr/bin/* }
