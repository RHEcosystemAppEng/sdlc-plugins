version: 1

filesystem_policy:
  include_workdir: false
  read_only:
    - /var/log
    - /usr
    - /lib
    - /lib64
    - /proc
    - /dev/urandom
    - /etc
    - /opt
    - /sandbox
  read_write:
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  llm_api:
    endpoints:
      - host: api.anthropic.com
        port: 443
      - host: "*-aiplatform.googleapis.com"
        port: 443
      - host: "bedrock-runtime.*.amazonaws.com"
        port: 443
    binaries:
      - { path: /usr/local/bin/* }
      - { path: /usr/bin/* }
  jira:
    endpoints:
      - host: "*.atlassian.net"
        port: 443
    binaries:
      - { path: /usr/local/bin/* }
      - { path: /usr/bin/* }
  figma:
    endpoints:
      - host: api.figma.com
        port: 443
      - host: "*.figma.com"
        port: 443
    binaries:
      - { path: /usr/local/bin/* }
      - { path: /usr/bin/* }
