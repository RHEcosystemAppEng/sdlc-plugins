version: 1

filesystem_policy:
  include_workdir: false
  read_only:
    - /var/log
    - /usr
    - /lib
    - /lib64
    - /proc
    - /dev/urandom
    - /etc
    - /opt
    - /sandbox
  read_write:
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  claude_code:
    name: claude-code
    endpoints:
      - { host: api.anthropic.com, port: 443 }
      - { host: "*.googleapis.com", port: 443 }
      - { host: "*.amazonaws.com", port: 443 }
      - { host: statsig.anthropic.com, port: 443 }
      - { host: sentry.io, port: 443 }
      - { host: raw.githubusercontent.com, port: 443 }
      - { host: platform.claude.com, port: 443 }
    binaries:
      - { path: "**/claude" }
      - { path: "**/node" }
  jira_read:
    name: jira-read
    endpoints:
      - { host: "*.atlassian.net", port: 443 }
    binaries:
      - { path: "**/claude" }
      - { path: "**/python3" }
  github_read:
    name: github-read
    endpoints:
      - { host: api.github.com, port: 443 }
    binaries:
      - { path: "**/claude" }
      - { path: "**/gh" }
